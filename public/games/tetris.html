<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        body { margin: 0; padding: 20px; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; }
        .container { text-align: center; color: #fff; }
        canvas { background: #111; border: 2px solid #0f0; display: block; margin: 20px auto; }
        h1, p { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TETRIS</h1>
        <canvas id="gameCanvas" width="200" height="400"></canvas>
        <p>Score: <span id="score">0</span></p>
        <p>Arrow Keys to Move | Space to Rotate</p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cols = 10;
        const rows = 20;
        const squareSize = 20;
        
        let board = [];
        let score = 0;
        let gameRunning = true;
        let current = null;
        
        function initBoard() {
            board = [];
            for (let i = 0; i < rows; i++) {
                board[i] = [];
                for (let j = 0; j < cols; j++) {
                    board[i][j] = 0;
                }
            }
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    ctx.strokeStyle = '#333';
                    ctx.strokeRect(j * squareSize, i * squareSize, squareSize, squareSize);
                    if (board[i][j]) {
                        ctx.fillStyle = '#0f0';
                        ctx.fillRect(j * squareSize + 1, i * squareSize + 1, squareSize - 2, squareSize - 2);
                    }
                }
            }
            
            document.getElementById('score').textContent = score;
        }
        
        function gameLoop() {
            draw();
            setTimeout(gameLoop, 500);
        }
        
        initBoard();
        gameLoop();
    </script>
</body>
</html>
